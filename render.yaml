services:
  - type: web
    name: hospital-backend
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    autoDeploy: true
    envVars:
      - key: NODE_ENV
        value: production

      - key: MONGODB_URI
        sync: false

      - key: JWT_SECRET
        generateValue: true

      - key: FRONTEND_URL
        sync: false